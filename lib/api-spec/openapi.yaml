openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: timeslots
    description: Time slot booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /timeslots:
    get:
      operationId: getTimeSlots
      tags: [timeslots]
      summary: Get available time slots
      responses:
        "200":
          description: List of time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSlot"
    post:
      operationId: createTimeSlot
      tags: [timeslots]
      summary: Create a new time slot (teacher only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeSlotRequest"
      responses:
        "201":
          description: Time slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSlot"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /timeslots/{id}:
    patch:
      operationId: updateTimeSlot
      tags: [timeslots]
      summary: Toggle availability of a time slot (teacher only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimeSlotRequest"
      responses:
        "200":
          description: Time slot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSlot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTimeSlot
      tags: [timeslots]
      summary: Delete a time slot (teacher only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bookings:
    get:
      operationId: getBookings
      tags: [timeslots]
      summary: Get all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [timeslots]
      summary: Book a time slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TimeSlot:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        available:
          type: boolean
      required:
        - id
        - label
        - startTime
        - endTime
        - available
    CreateTimeSlotRequest:
      type: object
      properties:
        label:
          type: string
        startTime:
          type: string
        endTime:
          type: string
      required:
        - label
        - startTime
        - endTime
    UpdateTimeSlotRequest:
      type: object
      properties:
        available:
          type: boolean
        label:
          type: string
        startTime:
          type: string
        endTime:
          type: string
    Booking:
      type: object
      properties:
        id:
          type: integer
        timeSlotId:
          type: integer
        timeSlotLabel:
          type: string
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
      required:
        - id
        - timeSlotId
        - timeSlotLabel
        - name
        - email
        - createdAt
    CreateBookingRequest:
      type: object
      properties:
        timeSlotId:
          type: integer
        name:
          type: string
        email:
          type: string
      required:
        - timeSlotId
        - name
        - email
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
