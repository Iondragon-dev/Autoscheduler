kind = "web"
previewPath = "/"
title = "Time Slot Booking"
version = "1.0.0"
id = "artifacts/time-slot-form"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18862
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/time-slot-form run dev"

[services.env]
PORT = "18862"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/time-slot-form", "run", "build"]
publicDir = "artifacts/time-slot-form/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
